  - path: "artifacts/veloce-scm/public/images/logo.png"
    description: "Minimal geometric logo mark representing supply chain logistics, using intersecting sharp lines in bright blue on a transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/veloce-scm/public/images/supply-chain.png"
    description: "Modern 3D isometric illustration of a stylized global supply chain network, featuring glowing nodes and connection lines over a dark blue background."
    aspect_ratio: "16:9"

notes:
  - React Query hooks are imported from @workspace/api-client-react
  - Auth uses cookie-based session, /api/auth/me checks current state
