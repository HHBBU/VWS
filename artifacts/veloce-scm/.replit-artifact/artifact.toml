kind = "web"
previewPath = "/"
title = "Veloce Wear Simulation"
version = "1.0.0"
id = "artifacts/veloce-scm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19034
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/veloce-scm run dev"

[services.env]
PORT = "19034"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/veloce-scm", "run", "build"]
publicDir = "artifacts/veloce-scm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
